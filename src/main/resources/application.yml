server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:23306/flashsale?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: true
  data:
    redis:
      host: localhost
      port: 16379
      database: 0

# 默认不启用 MQ 后端，请通过启动参数选择 rabbit 或 kafka Profile：
#   ./gradlew bootRun --args='--spring.profiles.active=rabbit'
#   ./gradlew bootRun --args='--spring.profiles.active=kafka'
