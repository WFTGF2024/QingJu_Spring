# RabbitMQ 模式配置
# 启动命令: docker compose -f docker-compose-rabbit.yml up -d
# 应用启动: ./gradlew bootRun --args='--spring.profiles.active=rabbit'

services:
  mysql:
    image: mysql:8
    container_name: flashsale-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flashsale
    ports:
      - "23306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: flashsale-redis
    ports:
      - "16379:6379"
    volumes:
      - ./redis-data:/data

  rabbitmq:
    image: rabbitmq:4.2.4
    container_name: flashsale-rabbit
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP 协议端口
      - "15672:15672"    # 管理界面端口
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
